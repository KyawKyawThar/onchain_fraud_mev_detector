name: onchain_fraud_mev_detector

services:
  # ── Postgres (in-flight jobs, incidents, labels/entities) ───────
  postgres:
    image: postgres:18-alpine
    restart: unless-stopped
    networks: [backend]
    # POSTGRES_DB/USER/PASSWORD are read straight from ../.env by the image —
    # no ${...} interpolation, so this works regardless of launch cwd.
    env_file: ../.env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Redis (hot cache, risk-score cache) ─────────────────────────
  redis:
    image: redis:8.6-alpine
    restart: unless-stopped
    networks: [backend]
    env_file: ../.env
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    # Shell form so the password is read from the container env ($$ escapes
    # compose interpolation), keeping it robust to launch cwd.
    command:
      - sh
      - -c
      - >
        exec redis-server
        --requirepass "$$REDIS_PASSWORD"
        --appendonly yes
        --maxmemory "$${REDIS_MAXMEMORY:-256mb}"
        --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$$REDIS_PASSWORD\" ping | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── ClickHouse (event store + incident/usage analytics, §14) ────
  clickhouse:
    image: clickhouse/clickhouse-server:latest
    restart: unless-stopped
    networks: [backend]
    # CLICKHOUSE_DB/USER/PASSWORD read straight from ../.env by the image.
    env_file: ../.env
    environment:
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: "1"
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    ports:
      - "${CLICKHOUSE_HTTP_PORT:-8123}:8123"   # HTTP / clients
      - "${CLICKHOUSE_TCP_PORT:-9001}:9000"    # native protocol
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8123/ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Zookeeper (Kafka coordination) ──────────────────────────────
  zookeeper:
    image: wurstmeister/zookeeper:latest
    restart: unless-stopped
    networks: [backend]
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  # ── Kafka (domain event backbone, §2/§4) ────────────────────────
  kafka:
    image: wurstmeister/kafka
    restart: unless-stopped
    networks: [backend]
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,INTERNAL://kafka:29092
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,INTERNAL://0.0.0.0:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,INTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_DEFAULT_REPLICATION_FACTOR: 1
      KAFKA_NUM_PARTITIONS: 3
    depends_on:
      - zookeeper
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    # Probe the broker itself, not just the port — a lost ZooKeeper session can
    # shut the broker JVM down while the container stays "Up" and Docker's proxy
    # keeps accepting on 9092 (then clients see AllBrokersDown). A real metadata
    # query marks that state `unhealthy` instead of silently dead.
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions.sh --bootstrap-server localhost:9092 >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 15s
      retries: 5
      start_period: 45s

  # ── Redpanda Console (Kafka dev UI) ─────────────────────────────
  redpanda-console:
    image: docker.redpanda.com/redpandadata/console:latest
    restart: unless-stopped
    networks: [backend]
    ports:
      - "8090:8080"
    environment:
      KAFKA_BROKERS: kafka:29092
    depends_on:
      - kafka

  # ── RabbitMQ (simulation sim.jobs work queue only, §7) ──────────
  rabbitmq:
    image: rabbitmq:4-management-alpine
    restart: unless-stopped
    networks: [backend]
    # RABBITMQ_DEFAULT_USER/PASS/VHOST read straight from ../.env by the image.
    env_file: ../.env
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    ports:
      - "${RABBITMQ_PORT:-5672}:5672"        # AMQP
      - "${RABBITMQ_MGMT_PORT:-15672}:15672"  # management UI
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s

  # ── Prometheus (metrics scrape + SLO alert rules, §19) ──────────
  # Scrapes every service's /metrics — targets live in ./prometheus.yml;
  # services run on the host, so `host.docker.internal` (mapped below for
  # Linux too) reaches them. Alert rules in ./prometheus-rules.yml (Sprint 13
  # t4) are evaluated here and routed to the `alertmanager` service below.
  prometheus:
    image: prom/prometheus:latest
    restart: unless-stopped
    networks: [backend]
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus-rules.yml:/etc/prometheus/rules/alerts.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9090/-/healthy"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Alertmanager (SLO alert routing, §19) ────────────────────────
  # Receives firing alerts from Prometheus and routes them per
  # ./alertmanager.yml — a placeholder webhook receiver until a real
  # destination (Slack/PagerDuty/email) is wired ahead of go-live.
  alertmanager:
    image: prom/alertmanager:latest
    restart: unless-stopped
    networks: [backend]
    volumes:
      - ./alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager_data:/alertmanager
    ports:
      - "${ALERTMANAGER_PORT:-9093}:9093"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9093/-/healthy"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Tempo (distributed tracing backend, §19) ─────────────────────
  # Receives spans over OTLP/HTTP on :4318 from any service that sets
  # OTEL_EXPORTER_OTLP_ENDPOINT=http://localhost:4318 (unset by default —
  # telemetry::init stays in-process-only otherwise, see crates/telemetry).
  # Single-binary, local-disk storage — the dev-loop equivalent of the
  # Prometheus/Grafana setup above, not a production topology.
  #
  # Pinned to the 2.x line deliberately: Tempo 3.0 restructured config around
  # a Kafka-backed ingest path (its `ingester`/`compactor` blocks moved and no
  # longer match this simple single-binary/local-storage shape) — pulling our
  # own Kafka cluster into the trace path is unwarranted complexity for a dev
  # trace store. Config verified against 2.6.1 (`docker run ... -config.file`
  # boots clean, HTTP OTLP listener up on :4318).
  tempo:
    image: grafana/tempo:2.6.1
    restart: unless-stopped
    command: ["-config.file=/etc/tempo/tempo.yaml"]
    networks: [backend]
    volumes:
      - ./tempo.yaml:/etc/tempo/tempo.yaml:ro
      - tempo_data:/var/tempo
    ports:
      - "${TEMPO_OTLP_HTTP_PORT:-4318}:4318" # OTLP/HTTP span ingest
      - "${TEMPO_QUERY_PORT:-3200}:3200" # Grafana's Tempo datasource reads this

  # ── Grafana (dashboards + trace explore, §19) ────────────────────
  # Datasources + dashboards are auto-provisioned from ./grafana/provisioning
  # + ./grafana/dashboards, so they exist on first boot with no click-ops.
  # Login: GRAFANA_ADMIN_USER / GRAFANA_ADMIN_PASSWORD (.env), defaulting to
  # admin / admin.
  grafana:
    image: grafana/grafana:latest
    restart: unless-stopped
    networks: [backend]
    depends_on:
      - prometheus
      - tempo
      - clickhouse
    # CLICKHOUSE_* (for the billing-usage dashboard's ClickHouse datasource
    # provisioning, ./grafana/provisioning/datasources/clickhouse.yml — Grafana
    # expands ${CLICKHOUSE_PASSWORD} from its own process env at provisioning
    # time) alongside the admin/plugin settings below.
    env_file: ../.env
    environment:
      GF_SECURITY_ADMIN_USER: "${GRAFANA_ADMIN_USER:-admin}"
      GF_SECURITY_ADMIN_PASSWORD: "${GRAFANA_ADMIN_PASSWORD:-admin}"
      GF_USERS_ALLOW_SIGN_UP: "false"
      # The billing-usage dashboard (§13, §19) needs the ClickHouse datasource
      # plugin — not bundled by default, installed at container start.
      GF_PLUGINS_PREINSTALL: grafana-clickhouse-datasource
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:3000/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s

# ─────────────────────────────────────────────
# Networks
# ─────────────────────────────────────────────
networks:
  backend:
    driver: bridge

# ─────────────────────────────────────────────
# Volumes
# ─────────────────────────────────────────────
volumes:
  postgres_data:
  redis_data:
  clickhouse_data:
  rabbitmq_data:
  prometheus_data:
  grafana_data:
  alertmanager_data:
  tempo_data:
