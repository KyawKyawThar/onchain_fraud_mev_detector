name: onchain_fraud_mev_detector

services:
  # ── Postgres (in-flight jobs, incidents, labels/entities) ───────
  postgres:
    image: postgres:18-alpine
    restart: unless-stopped
    networks: [backend]
    # POSTGRES_DB/USER/PASSWORD are read straight from ../.env by the image —
    # no ${...} interpolation, so this works regardless of launch cwd.
    env_file: ../.env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Redis (hot cache, risk-score cache) ─────────────────────────
  redis:
    image: redis:8.6-alpine
    restart: unless-stopped
    networks: [backend]
    env_file: ../.env
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    # Shell form so the password is read from the container env ($$ escapes
    # compose interpolation), keeping it robust to launch cwd.
    command:
      - sh
      - -c
      - >
        exec redis-server
        --requirepass "$$REDIS_PASSWORD"
        --appendonly yes
        --maxmemory "$${REDIS_MAXMEMORY:-256mb}"
        --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$$REDIS_PASSWORD\" ping | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── ClickHouse (event store + incident/usage analytics, §14) ────
  clickhouse:
    image: clickhouse/clickhouse-server:latest
    restart: unless-stopped
    networks: [backend]
    # CLICKHOUSE_DB/USER/PASSWORD read straight from ../.env by the image.
    env_file: ../.env
    environment:
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: "1"
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    ports:
      - "${CLICKHOUSE_HTTP_PORT:-8123}:8123"   # HTTP / clients
      - "${CLICKHOUSE_TCP_PORT:-9001}:9000"    # native protocol
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8123/ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Zookeeper (Kafka coordination) ──────────────────────────────
  zookeeper:
    image: wurstmeister/zookeeper:latest
    restart: unless-stopped
    networks: [backend]
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  # ── Kafka (domain event backbone, §2/§4) ────────────────────────
  kafka:
    image: wurstmeister/kafka
    restart: unless-stopped
    networks: [backend]
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,INTERNAL://kafka:29092
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,INTERNAL://0.0.0.0:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,INTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_DEFAULT_REPLICATION_FACTOR: 1
      KAFKA_NUM_PARTITIONS: 3
    depends_on:
      - zookeeper
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

  # ── Redpanda Console (Kafka dev UI) ─────────────────────────────
  redpanda-console:
    image: docker.redpanda.com/redpandadata/console:latest
    restart: unless-stopped
    networks: [backend]
    ports:
      - "8090:8080"
    environment:
      KAFKA_BROKERS: kafka:29092
    depends_on:
      - kafka

  # ── RabbitMQ (simulation sim.jobs work queue only, §7) ──────────
  rabbitmq:
    image: rabbitmq:4-management-alpine
    restart: unless-stopped
    networks: [backend]
    # RABBITMQ_DEFAULT_USER/PASS/VHOST read straight from ../.env by the image.
    env_file: ../.env
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    ports:
      - "${RABBITMQ_PORT:-5672}:5672"        # AMQP
      - "${RABBITMQ_MGMT_PORT:-15672}:15672"  # management UI
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s

# ─────────────────────────────────────────────
# Networks
# ─────────────────────────────────────────────
networks:
  backend:
    driver: bridge

# ─────────────────────────────────────────────
# Volumes
# ─────────────────────────────────────────────
volumes:
  postgres_data:
  redis_data:
  clickhouse_data:
  rabbitmq_data:
