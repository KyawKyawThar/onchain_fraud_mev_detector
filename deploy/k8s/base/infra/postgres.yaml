# ── Postgres (in-flight jobs, incidents, labels/entities, rules, §14) ──
# Single-instance StatefulSet: one stable identity + one PVC. Schema
# migrations are applied from CI (migrate.yml → sqlx migrate run) against the
# environment, not by the pods — see ../../README.md.
apiVersion: v1
kind: Service
metadata:
  name: postgres
  labels:
    app.kubernetes.io/name: postgres
spec:
  clusterIP: None # headless: clients dial the one pod via the service name
  selector:
    app.kubernetes.io/name: postgres
  ports:
    - name: postgres
      port: 5432
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
spec:
  serviceName: postgres
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: postgres
  template:
    metadata:
      labels:
        app.kubernetes.io/name: postgres
        app.kubernetes.io/part-of: mevwatch
    spec:
      containers:
        - name: postgres
          image: postgres:18-alpine
          ports:
            - name: postgres
              containerPort: 5432
          envFrom:
            # POSTGRES_DB / POSTGRES_USER / POSTGRES_PASSWORD — image-native names.
            - secretRef:
                name: postgres-credentials
          volumeMounts:
            # postgres:18 images keep PGDATA under /var/lib/postgresql (the
            # image's declared volume root) — mount the PVC there, not at the
            # pre-18 /var/lib/postgresql/data path.
            - name: data
              mountPath: /var/lib/postgresql
          readinessProbe:
            exec:
              command: ["sh", "-c", "pg_isready -U \"$POSTGRES_USER\""]
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            exec:
              command: ["sh", "-c", "pg_isready -U \"$POSTGRES_USER\""]
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 5
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: "2"
              memory: 2Gi
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: [ReadWriteOnce]
        resources:
          requests:
            storage: 10Gi
