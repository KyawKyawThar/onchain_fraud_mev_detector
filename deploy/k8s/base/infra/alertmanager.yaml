# ── Alertmanager (SLO alert routing, §19, Sprint 13 t4) ──────────────────
# In-cluster twin of deploy/alertmanager.yml — same placeholder receiver
# posture: no real Slack/PagerDuty/email destination is wired (no credentials
# to invent), swap it before go-live. See deploy/alertmanager.yml's header
# comment for the full rationale; kept identical here on purpose.
apiVersion: v1
kind: ConfigMap
metadata:
  name: alertmanager-config
data:
  alertmanager.yml: |
    global:
      resolve_timeout: 5m

    route:
      receiver: ops-placeholder
      group_by: ["alertname", "service"]
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 4h
      routes:
        - matchers:
            - severity = page
          repeat_interval: 1h

    receivers:
      - name: ops-placeholder
        webhook_configs:
          - url: "http://localhost:5001/placeholder-ops-webhook"
            send_resolved: true
---
apiVersion: v1
kind: Service
metadata:
  name: alertmanager
  labels:
    app.kubernetes.io/name: alertmanager
spec:
  selector:
    app.kubernetes.io/name: alertmanager
  ports:
    - name: http
      port: 9093
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: alertmanager
  labels:
    app.kubernetes.io/name: alertmanager
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: alertmanager
  template:
    metadata:
      labels:
        app.kubernetes.io/name: alertmanager
        app.kubernetes.io/part-of: mevwatch
        app.kubernetes.io/component: observability
    spec:
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: alertmanager
          image: prom/alertmanager:latest
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
          args:
            - --config.file=/etc/alertmanager/alertmanager.yml
            - --storage.path=/alertmanager
          ports:
            - name: http
              containerPort: 9093
          volumeMounts:
            - name: config
              mountPath: /etc/alertmanager
            - name: data
              mountPath: /alertmanager
          readinessProbe:
            httpGet: { path: /-/ready, port: http }
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /-/healthy, port: http }
            periodSeconds: 20
            failureThreshold: 3
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 256Mi
      volumes:
        - name: config
          configMap:
            name: alertmanager-config
        # Silences/notification log — not the audit record (§4), so an
        # ephemeral volume is fine; a lost silence just needs re-creating.
        - name: data
          emptyDir: {}
