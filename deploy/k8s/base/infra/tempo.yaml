# ── Tempo (distributed tracing backend, §19, Sprint 13 t4) ──────────────
# In-cluster twin of deploy/tempo.yaml — same config, same deliberate pin to
# the 2.x line (Tempo 3.0 restructured config around a Kafka-backed ingest
# path; see deploy/docker-compose.yml's tempo service comment for the full
# rationale). Receives OTLP/HTTP spans on :4318 from any pod that sets
# OTEL_EXPORTER_OTLP_ENDPOINT=http://tempo:4318 (unset by default — spans
# stay in-process-only, crates/telemetry).
apiVersion: v1
kind: ConfigMap
metadata:
  name: tempo-config
data:
  tempo.yaml: |
    server:
      http_listen_port: 3200

    distributor:
      receivers:
        otlp:
          protocols:
            http:
              endpoint: 0.0.0.0:4318

    ingester:
      trace_idle_period: 10s
      max_block_duration: 5m

    compactor:
      compaction:
        block_retention: 48h

    storage:
      trace:
        backend: local
        local:
          path: /var/tempo/blocks
        wal:
          path: /var/tempo/wal
---
apiVersion: v1
kind: Service
metadata:
  name: tempo
  labels:
    app.kubernetes.io/name: tempo
spec:
  selector:
    app.kubernetes.io/name: tempo
  ports:
    - name: otlp-http
      port: 4318
    - name: query
      port: 3200
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: tempo
spec:
  serviceName: tempo
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: tempo
  template:
    metadata:
      labels:
        app.kubernetes.io/name: tempo
        app.kubernetes.io/part-of: mevwatch
        app.kubernetes.io/component: observability
    spec:
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: tempo
          image: grafana/tempo:2.6.1
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
          args:
            - -config.file=/etc/tempo/tempo.yaml
          ports:
            - name: otlp-http
              containerPort: 4318
            - name: query
              containerPort: 3200
          volumeMounts:
            - name: config
              mountPath: /etc/tempo
            - name: data
              mountPath: /var/tempo
          readinessProbe:
            httpGet: { path: /ready, port: query }
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 1Gi
      volumes:
        - name: config
          configMap:
            name: tempo-config
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: [ReadWriteOnce]
        resources:
          requests:
            storage: 10Gi
