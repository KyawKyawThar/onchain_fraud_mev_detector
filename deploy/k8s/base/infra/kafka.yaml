# ── Kafka (domain event backbone, §2/§4/§20) ───────────────────────────
# Single-node KRaft StatefulSet on the official apache/kafka image — the
# compose stack's wurstmeister+ZooKeeper pair is a dev-era relic (unmaintained
# images, and KRaft removed the ZK dependency entirely). One node keeps
# replication-factor 1, matching the app-config topic topology; scaling to a
# real quorum is a StatefulSet + voters change behind the same Service name.
apiVersion: v1
kind: Service
metadata:
  name: kafka
  labels:
    app.kubernetes.io/name: kafka
spec:
  clusterIP: None
  selector:
    app.kubernetes.io/name: kafka
  ports:
    - name: kafka
      port: 9092
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: kafka
spec:
  serviceName: kafka
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: kafka
  template:
    metadata:
      labels:
        app.kubernetes.io/name: kafka
        app.kubernetes.io/part-of: mevwatch
    spec:
      containers:
        - name: kafka
          image: apache/kafka:3.9.1
          ports:
            - name: kafka
              containerPort: 9092
          env:
            # Pinned so a restarted pod recognises its formatted log dir —
            # a changed cluster id makes Kafka refuse the existing volume.
            - name: CLUSTER_ID
              value: 5L6g3nShT-eMCtK--X86sw
            - name: KAFKA_NODE_ID
              value: "1"
            - name: KAFKA_PROCESS_ROLES
              value: broker,controller
            - name: KAFKA_LISTENERS
              value: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
            # In-cluster clients dial the Service name; there is no host
            # listener — nothing outside the cluster speaks to the backbone.
            - name: KAFKA_ADVERTISED_LISTENERS
              value: PLAINTEXT://kafka:9092
            - name: KAFKA_CONTROLLER_QUORUM_VOTERS
              value: 1@localhost:9093
            - name: KAFKA_CONTROLLER_LISTENER_NAMES
              value: CONTROLLER
            - name: KAFKA_LISTENER_SECURITY_PROTOCOL_MAP
              value: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
            - name: KAFKA_INTER_BROKER_LISTENER_NAME
              value: PLAINTEXT
            # Internal topics at RF 1 on the single node.
            - name: KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR
              value: "1"
            - name: KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR
              value: "1"
            - name: KAFKA_TRANSACTION_STATE_LOG_MIN_ISR
              value: "1"
            # Compose parity: event-store provisions the real topics on boot;
            # auto-create only backstops ad-hoc dev topics.
            - name: KAFKA_AUTO_CREATE_TOPICS_ENABLE
              value: "true"
            - name: KAFKA_NUM_PARTITIONS
              value: "3"
            - name: KAFKA_DEFAULT_REPLICATION_FACTOR
              value: "1"
            - name: KAFKA_LOG_DIRS
              value: /var/lib/kafka/data
            - name: KAFKA_HEAP_OPTS
              value: -Xms1g -Xmx1g
          volumeMounts:
            - name: data
              mountPath: /var/lib/kafka/data
          # Probe the broker itself, not just the port — a broker JVM can be
          # dead while the container stays Running and the port still accepts
          # (clients then see AllBrokersDown). A real metadata query catches
          # that state; same lesson as the compose healthcheck.
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - /opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 > /dev/null 2>&1
            initialDelaySeconds: 20
            periodSeconds: 15
            timeoutSeconds: 15
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - /opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 > /dev/null 2>&1
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 15
            failureThreshold: 5
          resources:
            requests:
              cpu: 500m
              memory: 1536Mi
            limits:
              cpu: "2"
              memory: 2Gi
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: [ReadWriteOnce]
        resources:
          requests:
            storage: 10Gi
