# ── Grafana (dashboards + trace explore, §19, Sprint 13 t4) ─────────────
# Datasources + dashboards are generated from the same files the compose
# stack uses (deploy/grafana/..., via the base kustomization's
# configMapGenerator) — one source of truth, no drift between the two deploy
# targets. Admin credentials come from the grafana-admin Secret (dev overlay
# generates it from secrets/grafana.env; prod expects ESO/Vault to provision
# it, same posture as the other six Secrets).
apiVersion: v1
kind: Service
metadata:
  name: grafana
  labels:
    app.kubernetes.io/name: grafana
spec:
  selector:
    app.kubernetes.io/name: grafana
  ports:
    - name: http
      port: 3000
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: grafana
spec:
  serviceName: grafana
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: grafana
  template:
    metadata:
      labels:
        app.kubernetes.io/name: grafana
        app.kubernetes.io/part-of: mevwatch
        app.kubernetes.io/component: observability
    spec:
      securityContext:
        runAsNonRoot: true
        fsGroup: 472 # the grafana image's own uid/gid — the PVC must be group-writable for it
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: grafana
          image: grafana/grafana:latest
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
          env:
            - name: GF_SECURITY_ADMIN_USER
              valueFrom:
                secretKeyRef:
                  name: grafana-admin
                  key: GF_SECURITY_ADMIN_USER
            - name: GF_SECURITY_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: grafana-admin
                  key: GF_SECURITY_ADMIN_PASSWORD
            - name: GF_USERS_ALLOW_SIGN_UP
              value: "false"
            # The billing-usage dashboard's datasource (§13) — not bundled by
            # default.
            - name: GF_PLUGINS_PREINSTALL
              value: grafana-clickhouse-datasource
            # Expanded into the ClickHouse datasource provisioning YAML's
            # ${CLICKHOUSE_USER}/${CLICKHOUSE_PASSWORD}/${CLICKHOUSE_DB} at
            # Grafana's own provisioning-read time (not a kustomize/shell
            # substitution) — same mechanism deploy/docker-compose.yml relies
            # on for the compose Grafana.
            - name: CLICKHOUSE_USER
              valueFrom:
                secretKeyRef:
                  name: clickhouse-credentials
                  key: CLICKHOUSE_USER
            - name: CLICKHOUSE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: clickhouse-credentials
                  key: CLICKHOUSE_PASSWORD
            - name: CLICKHOUSE_DB
              valueFrom:
                secretKeyRef:
                  name: clickhouse-credentials
                  key: CLICKHOUSE_DB
          ports:
            - name: http
              containerPort: 3000
          volumeMounts:
            - name: data
              mountPath: /var/lib/grafana
            - name: dashboards
              mountPath: /var/lib/grafana/dashboards
            - name: dashboard-provider
              mountPath: /etc/grafana/provisioning/dashboards
            - name: datasources
              mountPath: /etc/grafana/provisioning/datasources
          readinessProbe:
            httpGet: { path: /api/health, port: http }
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /api/health, port: http }
            periodSeconds: 20
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: dashboards
          configMap:
            name: grafana-dashboards
        - name: dashboard-provider
          configMap:
            name: grafana-dashboard-provider
        - name: datasources
          configMap:
            name: grafana-datasources
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: [ReadWriteOnce]
        resources:
          requests:
            storage: 5Gi
