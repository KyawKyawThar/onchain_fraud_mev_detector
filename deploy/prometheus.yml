# Prometheus scrape config (§19). Scrapes each service's /metrics endpoint —
# today the detection service's per-detector hit rate + latency
# (detector_runs_total / detector_hits_total / detector_detect_duration_seconds).
#
# The services run on the **host** (they aren't containerized in this compose yet),
# so targets reach them via `host.docker.internal`, mapped to the host gateway in
# the Prometheus service's `extra_hosts`. When a service is containerized, switch
# its target to the compose service name on the `backend` network.
global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: detection
    static_configs:
      - targets: ["host.docker.internal:9100"] # DETECTION_METRICS_ADDR
        labels:
          service: detection

  # Intelligence block-production consumer (§10, Sprint 11) — the builder/relay
  # dashboard metrics: relay attributed/missed, snapshots appended, heuristic
  # builder labels minted, incidents buffered. Host-run like detection, reached
  # via `host.docker.internal`; port is INTELLIGENCE_METRICS_ADDR.
  - job_name: intelligence
    static_configs:
      - targets: ["host.docker.internal:9108"] # INTELLIGENCE_METRICS_ADDR
        labels:
          service: intelligence

  # RabbitMQ sim.jobs work queue (§7/§20) — queue depth is the simulation
  # backpressure signal. Unlike the host-run services above, the broker runs in
  # this compose stack, so it's reachable by service name on the `backend`
  # network (no host port mapping needed); its `rabbitmq_prometheus` plugin is
  # enabled by default and serves metrics on :15692.
  #
  # `/metrics/per-object` (not the default aggregate `/metrics`) so each series
  # carries a `queue` label — required to tell sim.jobs apart from sim.jobs.dlq.
  # Cardinality is trivial here (two queues).
  - job_name: rabbitmq
    metrics_path: /metrics/per-object
    static_configs:
      - targets: ["rabbitmq:15692"]
        labels:
          service: simulation
