[package]
name = "simulation"
version = "0.1.0"
edition.workspace = true
license.workspace = true
publish.workspace = true

# Simulation service (¬ß7) ‚Äî the slow path that confirms or retracts a provisional
# alert with revm. Sprint 5 builds its *front half*:
#
#   `dispatcher` ‚Äî a thin Kafka consumer on `PreliminaryAlertCreated` that, for
#     every provisional alert, publishes one `SimulationJob` *command* onto the
#     RabbitMQ `sim.jobs` work queue (¬ß2/¬ß7) and emits a `SimulationRequested`
#     domain event back on Kafka so the *request* is auditable even though the
#     command itself is deliberately not (the audit log records facts, and a
#     command is not one ‚Äî only its result re-enters the backbone).
#   `command` ‚Äî the `SimulationJob` type + the pure `PreliminaryAlertCreated ‚Üí
#     (SimulationJob, SimulationRequested)` mapping (Kafka/RabbitMQ-free, so it is
#     `assert_eq!`-testable).
#   `queue` ‚Äî the `JobSink` publish seam (mirrors `event-bus`'s `EventSink`): an
#     object-safe trait + the lapin-backed `RabbitJobSink` + the at-least-once
#     `publish_resilient` policy, so the worker pool (task 3) and the dispatcher
#     share one place that knows how to talk to RabbitMQ.
#
# The worker pool (revm on rayon, task 3) and the result‚Üíincident path (Sprint 6)
# land on top of this seam.

[[bin]]
name = "simulation"
path = "src/main.rs"

# The worker pool that drains `sim.jobs` (Sprint 5 t3) ‚Äî a separate binary so it
# scales independently of the dispatcher (¬ß20: "scale aggressively ‚Äî revm CPU is
# the bottleneck"; competing consumers = run N replicas).
[[bin]]
name = "simulation-worker"
path = "src/bin/worker.rs"

# The incident/job persistence consumer (Sprint 6 t5) ‚Äî a separate binary so it
# scales independently of the dispatcher + worker (it is a Kafka projection, not a
# revm worker). Consumes the result-path events, folds them via the pure
# `IncidentProjection`, and write-throughs to Postgres (mutable read model) +
# ClickHouse (append-only analytics), ¬ß14.
[[bin]]
name = "simulation-projection"
path = "src/bin/projection.rs"

[dependencies]
events = { workspace = true }
# Shared Kafka producer seam (¬ß20) ‚Äî the dispatcher ships its `SimulationRequested`
# audit event through the same `EventSink`/`publish_resilient` ingestion/detection
# use, so the at-least-once policy lives in one place.
event-bus = { workspace = true }
telemetry = { workspace = true }

anyhow = { workspace = true }
thiserror = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
tracing = { workspace = true }
# Event-time (`occurred_at`) drives the incident projection's last-writer-wins
# figure updates + reorder tolerance (¬ß7); the type comes from the envelope.
chrono = { workspace = true }

# The async dispatcher runs on tokio with a `CancellationToken` for graceful
# drain; `rdkafka` is the `PreliminaryAlertCreated` consumer; `async-trait` for
# the `JobSink`/`EventSink` seams. `tokio-stream` drains the worker pool's lapin
# `Consumer` (the competing-consumer side of `sim.jobs`).
tokio = { workspace = true }
tokio-util = { workspace = true }
tokio-stream = { workspace = true }
rdkafka = { workspace = true }
async-trait = { workspace = true }

# RabbitMQ command broker (¬ß7) ‚Äî see the workspace note. lapin is handed tokio's
# executor+reactor so it shares the service's single runtime.
lapin = { workspace = true }
tokio-executor-trait = { workspace = true }
tokio-reactor-trait = { workspace = true }

# The simulation engine (¬ß7): the worker pool re-executes a job's bundle in revm.
# `rayon` is the CPU worker pool the revm runs land on, off the async reactor
# (¬ß17); the async worker bridges to it via a oneshot. See the workspace notes.
revm = { workspace = true }
rayon = { workspace = true }

# Sprint 6 t5 ‚Äî the projection consumer's persistence (¬ß14). Postgres (via sqlx +
# the shared `db` pool builder) is the mutable read model of in-flight jobs +
# confirmed incidents; ClickHouse is the append-only incident-analytics firehose,
# written RowBinary through the same `clickhouse` client the event store uses.
# `secrecy` keeps the ClickHouse password out of `Debug`/logs (mirrors event-store);
# `uuid` maps the `alert_id`/`incident_id` columns; `alloy-primitives` renders `B256`
# tx/block hashes to hex for the stored rows (non-test code now needs it directly).
db = { workspace = true }
ch-migrate = { workspace = true }
sqlx = { workspace = true }
clickhouse = { workspace = true }
secrecy = { workspace = true }
uuid = { workspace = true }
alloy-primitives = { workspace = true }

# `simulation-projection`'s internal read surface (¬ß11 `GET /v1/incidents` ‚Äî
# fronted by the public API service, exactly like event-store's read routes).
# axum + tower-http mirror event-store's own internal HTTP stack; api-error is
# the shared handler-error type (see crates/api-error).
axum = { workspace = true }
tower-http = { workspace = true }
api-error = { workspace = true }

[features]
# Exposes `simulation::test_util` (canned scenarios + ack handle, plus the
# recording sink re-exported from event-bus). Enabled for this crate's own
# integration tests via the self dev-dependency below, so `tests/` and the
# in-crate unit tests share one set of doubles. Forwards to event-bus's own
# test-util so the re-exported `RecordingEventSink` resolves in both.
test-util = ["event-bus/test-util"]

[dev-dependencies]
# `EnumIter` iteration in the wire-string drift tests (exhaustive over variants).
strum = { workspace = true }
# Self-dependency with `test-util` on, so the `tests/` integration crate sees
# `simulation::test_util` (the in-crate unit tests get it under `cfg(test)`).
simulation = { path = ".", features = ["test-util"] }
# `alloy-primitives` and `uuid` are also normal deps now (the store renders hashes
# and maps id columns), so tests get them transitively ‚Äî no separate dev entry.
# Live-broker integration tests (`#[ignore]`): a real RabbitMQ for the `sim.jobs`
# topology (`tests/topology.rs`, `tests/worker.rs`), a real Postgres + ClickHouse for
# the projection store write-through (`tests/projection_store.rs`).
testcontainers = { workspace = true }
testcontainers-modules = { workspace = true, features = [
    "rabbitmq",
    "postgres",
    "clickhouse",
] }

[lints]
workspace = true
