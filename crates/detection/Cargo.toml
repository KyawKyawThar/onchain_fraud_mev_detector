[package]
name = "detection"
version = "0.1.0"
edition.workspace = true
license.workspace = true
publish.workspace = true

# Detection service (¬ß6) ‚Äî the fast path. The detector *seam* (the
# `DetectorPlugin` trait + `DetectionCtx`/enrichment) lives in the separate
# `detector-api` crate so detectors decouple from the service; this crate is the
# service side: the model registry (task 2), feature flags (task 2), and the
# compile-time `Registry` that collects detectors (task 1), re-exporting
# `detector-api` so `detection::DetectorPlugin` etc. keep resolving. Task 5 adds
# the synchronous emission core (`emit`, `state`); the async/Kafka consumer loop
# and rayon fan-out land in Sprint 4.

[[bin]]
name = "detection"
path = "src/main.rs"

[dependencies]
# The detector seam ‚Äî re-exported so downstream keeps using `detection::*`.
detector-api = { workspace = true }
events = { workspace = true }
# Shared publish seam (¬ß20) ‚Äî the scheduler ships detector/alert events through
# the same `EventSink`/`publish_resilient` ingestion uses.
event-bus = { workspace = true }
telemetry = { workspace = true }

anyhow = { workspace = true }
thiserror = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
alloy-primitives = { workspace = true }
tracing = { workspace = true }
# Per-detector metrics (¬ß19, task 3): every `detect` run records its latency + a
# hit/miss through the `metrics` facade; the binary exports them via
# `telemetry::metrics`. A no-op until an exporter installs the global recorder.
metrics = { workspace = true }

# Concurrency model (¬ß17, Sprint 4 task 2): the async scheduler runs on `tokio`
# with bounded `mpsc` channels for inter-stage backpressure and a
# `CancellationToken` for graceful drain; `rayon` is the CPU pool the per-block
# Block-detector fan-out runs on (bridged off the reactor via `spawn_blocking`);
# `rdkafka` is the `BlockAssembled`/`BlockReverted` consumer + the producer behind
# `KafkaEventSink`; `async-trait` for the consumer/sink seams.
tokio = { workspace = true }
tokio-util = { workspace = true }
rayon = { workspace = true }
rdkafka = { workspace = true }
async-trait = { workspace = true }

# Model registry (¬ß6, task 2). `chrono` carries each model card's `deployed_at`
# timestamp; `sha2` computes the `config_hash` that pins a detector's active
# config onto every emitted `DetectorTriggered` for reproducible replay (¬ß18).
chrono = { workspace = true }
sha2 = { workspace = true }

# Built-in detectors (¬ß6, task 4). Each is an *optional* dependency behind a
# feature of the same name; `register_builtins` wires it in under
# `#[cfg(feature = "‚Ä¶")]`, so the set of linked detectors ‚Äî and therefore the
# binary's plugin roster ‚Äî is fixed at compile time and selectable per build
# (premium detectors stay in closed builds, ¬ß6). Because the detectors depend on
# `detector-api` (not this crate), there's no dependency cycle.
sandwich-detector = { workspace = true, optional = true }
arb-detector = { workspace = true, optional = true }
# Phase-3 detectors (¬ß22, Sprint 10 t1). `washtrading` is the first
# `Scope::CrossBlock` detector ‚Äî wired through `register_cross_block_builtins` into
# the `CrossBlockStates` roster rather than the `Block` `register_builtins`.
flashloan-detector = { workspace = true, optional = true }
liquidation-detector = { workspace = true, optional = true }
rugpull-detector = { workspace = true, optional = true }
washtrading-detector = { workspace = true, optional = true }
poisoning-detector = { workspace = true, optional = true }
# Dev/test-only synthetic detector behind the `demo` feature (¬ß19) ‚Äî see below.
demo-detector = { workspace = true, optional = true }

[features]
default = []
# Link the open-source Phase-2 detectors (¬ß22). A binary turns these on (or a
# superset including closed detectors) at build time; the library default links
# none, leaving the choice to the composing binary.
sandwich = ["dep:sandwich-detector"]
arb = ["dep:arb-detector"]
flashloan = ["dep:flashloan-detector"]
liquidation = ["dep:liquidation-detector"]
rugpull = ["dep:rugpull-detector"]
washtrading = ["dep:washtrading-detector"]
poisoning = ["dep:poisoning-detector"]
# The full open-source Phase-2 + Phase-3 roster (¬ß22). A binary turns this on (or a
# superset including closed detectors) at build time; the library default links none.
detectors = [
    "sandwich",
    "arb",
    "flashloan",
    "liquidation",
    "rugpull",
    "washtrading",
    "poisoning",
]
# Link the synthetic `demo` detector (¬ß19): fires on a deterministic schedule
# regardless of tx content, so the per-detector metrics (hit rate/findings/
# latency) and the emit path can be exercised end-to-end while the live source is
# still header-only. Dev/demo only ‚Äî never enable in a real build.
demo = ["dep:demo-detector"]

[dev-dependencies]
# `MockDetector`/`dummy_evidence` for the registry/model tests ‚Äî the seam's test
# doubles now live in `detector-api` behind its `test-util` feature.
detector-api = { workspace = true, features = ["test-util"] }
# Shared recording `EventSink` for the scheduler's emit tests.
event-bus = { workspace = true, features = ["test-util"] }
# In-memory recorder so the metrics tests can assert on recorded series (runs,
# hits, latency) under a scoped recorder ‚Äî no global install, no scrape.
metrics-util = { workspace = true }

[lints]
workspace = true
