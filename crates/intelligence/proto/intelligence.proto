// The intelligence service's read contract (§8, §11): the synchronous
// lookups the public API service (and any other in-network caller) needs —
// an address's current risk score, its active labels, and the one-round-trip
// counterparty-screening bundle behind `POST /v1/address/{addr}/screen`.
// Nothing here is a command; every RPC is read-only, mirroring the
// store/cache seams behind it (`crate::store`, `crate::cache`) — this is a
// wire-level view onto them, not a second source of truth.
syntax = "proto3";

package intelligence.v1;

service IntelligenceRead {
  // Current risk score for an address (§8.3). Serves from the hot cache when
  // present; computes live (and repopulates the cache) on a miss.
  rpc GetRiskScore(RiskScoreRequest) returns (RiskScoreReply);

  // An address's active labels (§8.1), most-authoritative-first. Same
  // cache-aside behavior as GetRiskScore.
  rpc GetLabels(LabelsRequest) returns (LabelsReply);

  // Every decision input the synchronous counterparty-screening endpoint
  // (§11) needs for one address — score, confidence, labels, sanctions
  // matches and entity membership — in a single round-trip, because the
  // caller is the one latency-critical blocking surface in the API
  // (p50 < 100ms, §19). Facts only: the allow/review/block *decision* is the
  // API service's policy layer, not this service's. Cache-aside over one
  // Redis bundle (§8.3 hot path); a miss computes live and repopulates.
  rpc GetScreeningFacts(ScreeningFactsRequest) returns (ScreeningFactsReply);

  // The builder/relay leaderboard (§10, Sprint 11 t2): top builders by
  // confirmed sandwich volume, and each configured relay's market share by
  // MEV type. Aggregates the append-only block-production snapshots in
  // ClickHouse (latest-per-block, reverted excluded) — no cache, it's an
  // analytics scan, not a hot-path lookup.
  rpc GetBuilderLeaderboard(BuilderLeaderboardRequest) returns (BuilderLeaderboardReply);

  // The addresses connected to an entity, out to `hops` levels, as a
  // degree-capped subgraph (§8.2 — critical, §11). Walks the ClickHouse
  // adjacency store from the entity's members; a hub node (degree over the
  // cap) is a boundary the walk stops at, never a bridge it crosses.
  rpc GetEntityGraph(EntityGraphRequest) returns (EntityGraphReply);

  // The entity's curated milestone timeline (§8.4, §11): first seen,
  // classification/label changes, notable attributed incidents — a narrative
  // history projected from intelligence's own stores, distinct from the
  // incident-level audit trail.
  rpc GetEntityTimeline(EntityTimelineRequest) returns (EntityTimelineReply);
}

message RiskScoreRequest {
  // 0x-prefixed hex address, any case.
  string address = 1;
}

message RiskScoreReply {
  // 0-100, "how risky".
  uint32 score = 1;
  // 0-1, "how sure" — never conflated with `score` (§8.3).
  double confidence = 2;
  string model_version = 3;
  // Unix milliseconds.
  int64 computed_at_unix_millis = 4;
}

message LabelsRequest {
  string address = 1;
}

message Label {
  string label_id = 1;
  string kind = 2;
  string value = 3;
  double confidence = 4;
  string source = 5;
  string source_detail = 6;
  // Unix milliseconds.
  int64 created_at_unix_millis = 7;
  // Unix milliseconds; absent (0 + present=false handled via optional) when the
  // label has no expiry.
  optional int64 valid_until_unix_millis = 8;
}

message LabelsReply {
  repeated Label labels = 1;
}

message ScreeningFactsRequest {
  // 0x-prefixed hex address, any case.
  string address = 1;
}

// One sanctions-list designation for the address (§8.5). Any entry at all is
// the hard-block signal that bypasses the caller's score thresholds.
message SanctionMatch {
  // Which list designated it (`ofac_sdn`, `eu_consolidated`, …).
  string list = 1;
  // The list's own entry (SDN name / programme).
  string entry = 2;
}

message ScreeningFactsReply {
  // 0-100, "how risky" (§8.3).
  uint32 score = 1;
  // 0-1, "how sure" — never conflated with `score` (§8.3).
  double confidence = 2;
  string model_version = 3;
  // Unix milliseconds.
  int64 computed_at_unix_millis = 4;
  // Sanctions-list matches; non-empty means sanctioned (§8.5 hard block).
  repeated SanctionMatch sanctions = 5;
  // The address's active labels (§8.1) — context for the decision record.
  repeated Label labels = 6;
  // The address's resolved entity (UUID string), absent when unclustered.
  optional string entity_id = 7;
  // Member count of that entity (0 when unclustered).
  uint32 entity_size = 8;
}

message BuilderLeaderboardRequest {
  // Chain id (e.g. 1 = Ethereum mainnet).
  uint64 chain = 1;
  // Max builder rows to return; 0 means the server default (relays are always
  // returned in full — the configured set is small).
  uint32 limit = 2;
  // Optional recency floor (Unix milliseconds): only blocks whose latest
  // snapshot is at/after this instant count. Absent = all history.
  optional int64 since_unix_millis = 3;
}

message BuilderStats {
  // Payout address (feeRecipient), lowercase 0x-hex.
  string fee_recipient = 1;
  // Display name from intelligence labels; empty when unlabeled.
  string builder_label = 2;
  uint64 blocks_produced = 3;
  uint64 sandwich_count = 4;
  uint64 arb_count = 5;
  uint64 other_mev_count = 6;
  double mev_extracted_usd = 7;
}

message RelayStats {
  string relay = 1;
  uint64 blocks_delivered = 2;
  uint64 sandwich_count = 3;
  uint64 arb_count = 4;
  uint64 other_mev_count = 5;
  double mev_extracted_usd = 6;
  // Market share (0-1) of every relay-delivered block of each MEV type.
  double sandwich_share = 7;
  double arb_share = 8;
  double other_mev_share = 9;
}

message BuilderLeaderboardReply {
  // Ranked by sandwich volume, descending.
  repeated BuilderStats builders = 1;
  repeated RelayStats relays = 2;
}

message EntityGraphRequest {
  // The entity id (UUID string).
  string entity_id = 1;
  // Chain id to walk within (e.g. 1 = Ethereum mainnet).
  uint64 chain = 2;
  // Hops out from the entity's members; 0 means the server default. Clamped to
  // the server's hard ceiling.
  uint32 hops = 3;
}

message GraphNode {
  // 0x-prefixed lowercase hex address.
  string address = 1;
  // Distance from the nearest entity member (0 for a member).
  uint32 hop = 2;
  // This address is one of the entity's own members (a walk seed).
  bool is_seed = 3;
  // This address is a degree-capped hub — the walk stopped here (§8.2).
  bool is_hub = 4;
}

message GraphEdge {
  // Both endpoints, 0x-hex; `from` is the lexicographically smaller address.
  string from = 1;
  string to = 2;
}

message EntityGraphReply {
  // False when the entity is unknown (the edge maps this to a 404).
  bool found = 1;
  // The entity's member addresses — the walk's hop-0 seeds.
  repeated string seeds = 2;
  repeated GraphNode nodes = 3;
  repeated GraphEdge edges = 4;
  // The walk stopped early — more of the graph may exist beyond these nodes.
  bool truncated = 5;
  // Why the walk stopped short, if it did: any of `hub_boundary` (hit a
  // degree-capped hub), `hop_boundary` (more hops available — fetch deeper),
  // `node_budget` (too large — narrow the query). Empty = a complete graph.
  repeated string truncation_reasons = 6;
}

message EntityTimelineRequest {
  // The entity id (UUID string).
  string entity_id = 1;
}

message TimelineMilestone {
  // Milestone kind wire string: `first_seen` | `labeled` | `incident`.
  string kind = 1;
  // Unix milliseconds.
  int64 occurred_at_unix_millis = 2;
  // The member address this milestone concerns, 0x-hex; empty when entity-level.
  string address = 3;
  // A one-line narrative rendering of the milestone.
  string summary = 4;
  // A stable reference for the audit-trail hop (incident_id / label_id); empty
  // when none.
  string reference = 5;
}

message EntityTimelineReply {
  // False when the entity is unknown (the edge maps this to a 404).
  bool found = 1;
  // Milestones oldest first.
  repeated TimelineMilestone milestones = 2;
}
