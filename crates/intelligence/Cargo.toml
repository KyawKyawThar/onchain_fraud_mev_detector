[package]
name = "intelligence"
version = "0.1.0"
edition.workspace = true
license.workspace = true
publish.workspace = true

# Intelligence service (¬ß8) ‚Äî the moat: labels, entity clustering, attribution,
# risk scores, sanctions. Sprint 7 t1 builds its *data-store layer* (¬ß14), each
# store behind an object-safe seam so the consumers landing in t2‚Äìt5 are tested
# against in-memory doubles:
#
#   `store`     ‚Äî Postgres system of record: labels with provenance (conflicting
#                 labels coexist, ¬ß8.1), versioned entities + membership (¬ß8.2),
#                 attribution records, sanctions lists (¬ß8.5).
#   `cache`     ‚Äî the Redis hot-path label/score cache (TTL-backed, evicted on
#                 update) serving the synchronous screening path (¬ß11).
#   `adjacency` ‚Äî the append-only ClickHouse address graph the hop queries walk,
#                 degree-capped at hub nodes (¬ß8.2 ‚Äî critical).
#
# The Kafka consumer (attribution on IncidentCreated, t4), label seeding (t2),
# clustering (t3) and the per-entity merge actor (t5) build on these seams.

[[bin]]
name = "intelligence"
path = "src/main.rs"

[dependencies]
events = { workspace = true }
telemetry = { workspace = true }

anyhow = { workspace = true }
thiserror = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
strum = { workspace = true }
tracing = { workspace = true }
chrono = { workspace = true }
async-trait = { workspace = true }
tokio = { workspace = true }

# Postgres (via the shared `db` pool builder + sqlx compile-checked queries) is
# the mutable, transactional system of record (¬ß14); ClickHouse holds the
# append-only adjacency graph; Redis is the hot cache. `secrecy` keeps the
# ClickHouse/Redis credentials out of `Debug`/logs (mirrors event-store);
# `alloy-primitives` renders `Address` to the stored 0x-hex form.
db = { workspace = true }
ch-migrate = { workspace = true }
sqlx = { workspace = true }
clickhouse = { workspace = true }
redis = { workspace = true }
secrecy = { workspace = true }
alloy-primitives = { workspace = true }

# Label seeding from the ¬ß8.1 public feeds (t2). `csv` parses the
# Etherscan-style tag exports (quoted RFC-4180 ‚Äî name tags contain commas);
# `sha2` + `uuid` mint the *deterministic* seeded `label_id` (SHA-256 of the
# claim ‚Üí UUIDv8) that makes a feed re-import an idempotent no-op while a
# changed claim lands as a new coexisting row, never an overwrite.
csv = { workspace = true }
sha2 = { workspace = true }
uuid = { workspace = true }

# Import counters for seed batches (¬ß19), through the `metrics` facade ‚Äî a
# no-op until the binary installs the exporter (`telemetry::metrics::init`),
# same stance as detection's per-detector metrics.
metrics = { workspace = true }

[features]
# Exposes `intelligence::test_util` (in-memory store/cache doubles) to this
# crate's own integration tests and, later, to the t2‚Äìt5 consumers' tests.
test-util = []

[dev-dependencies]
# Property tests (¬ß18): the address_key encode/decode bijection over the whole
# address space.
proptest = { workspace = true }
# In-memory recorder so the seed-import metrics test can assert on recorded
# series without an exporter (mirrors detection).
metrics-util = { workspace = true }
# Self-dependency with `test-util` on, so `tests/` sees the in-memory doubles.
intelligence = { path = ".", features = ["test-util"] }
# Live-store integration tests (`#[ignore]`): real Postgres, Redis and ClickHouse
# via throwaway containers, run by `just test-integration`.
testcontainers = { workspace = true }
testcontainers-modules = { workspace = true, features = [
    "postgres",
    "redis",
    "clickhouse",
] }

[lints]
workspace = true
