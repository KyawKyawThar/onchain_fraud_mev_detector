# cargo-deny config — drives the `security` CI job and `just deny`.
# https://embarkstudios.github.io/cargo-deny/

[advisories]
version = 2
# Vulnerabilities (CVEs) and yanked crates always hard-fail. *Unmaintained*
# advisories are informational, not security holes — `cargo audit` only warns on
# them too. We can't fix an unmaintained crate buried in a transitive dep (e.g.
# `paste`/`derivative` under alloy-primitives, §21), so we only fail when a crate
# we depend on *directly* is unmaintained — something we can actually act on.
unmaintained = "workspace"
ignore = []

[licenses]
version = 2
# Permissive licenses we accept for dependencies. Add to this list as deps
# pull in new (compatible) licenses — CI fails loudly on anything unlisted.
allow = [
  "MIT",
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "ISC",
  "Zlib",
  "MPL-2.0",
  "Unicode-3.0",
  "Unicode-DFS-2016",
  # Public-domain dedication. Covers the optional secp256k1/bitcoin_hashes
  # crates alloy-primitives can pull in (§21 stack); fully permissive.
  "CC0-1.0",
]
confidence-threshold = 0.8
# Our own crates are `license = "proprietary"` + `publish = false`; ignore them.
private = { ignore = true }

[bans]
# Warn (don't fail) on duplicate versions of the same crate — common early on.
multiple-versions = "warn"
# Forbid wildcard ("*") version requirements on crates.io deps...
wildcards = "deny"
# ...but allow internal workspace path deps (e.g. `db = { path = "../db" }`),
# which cargo-deny otherwise reports as wildcards.
allow-wildcard-paths = true

[sources]
# Only crates.io and explicitly-allowed git sources.
unknown-registry = "deny"
unknown-git = "deny"
