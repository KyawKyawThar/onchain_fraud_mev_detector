[workspace]
resolver = "2"
members = ["crates/*"]

[workspace.package]
edition = "2021"
license = "proprietary"
publish = false

# Shared dependency versions. Pin and reference these from member crates with
# `dep = { workspace = true }`. Add crates here as services start needing them.
[workspace.dependencies]
anyhow = "1"
thiserror = "2"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
