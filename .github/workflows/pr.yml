name: PR Validation

# Fast feedback on every pull request. The full gate (security, bench-smoke,
# integration) runs on merge via ci.yml.

on:
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: pr-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0          # required for sccache
  SQLX_OFFLINE: "true"
  RUSTC_WRAPPER: sccache
  SCCACHE_GHA_ENABLED: "true"

jobs:
  # ── Fail fast: fmt, clippy, and a locked build ───────────────────
  quick-checks:
    name: Quick checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: rui314/setup-mold@v1
      - uses: mozilla-actions/sccache-action@v0.0.6
      - uses: Swatinem/rust-cache@v2
      - name: cargo fmt --check
        run: cargo fmt --all --check
      - name: cargo clippy (-D warnings)
        run: cargo clippy --workspace --all-targets --all-features --locked -- -D warnings
      # --locked fails if Cargo.lock is stale/uncommitted — the Rust analog of
      # the `go mod tidy` diff check.
      - name: cargo build (locked)
        run: cargo build --workspace --all-features --locked

  # ── Coverage → Codecov ───────────────────────────────────────────
  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: rui314/setup-mold@v1
      - uses: mozilla-actions/sccache-action@v0.0.6
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov
      - name: Generate coverage (lcov)
        run: cargo llvm-cov --workspace --all-features --locked --lcov --output-path lcov.info
      - name: Upload to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}   # repo secret; optional for public repos
          files: lcov.info
          fail_ci_if_error: false                # don't block the PR on Codecov hiccups
