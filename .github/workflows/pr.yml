name: PR & Branch Validation

# Fast feedback on every pull request AND every push to a non-main branch, so
# work-in-progress on a feature branch is checked even before a PR is opened.
# The full gate (security, bench-smoke, integration) + image publish runs only
# on main / version tags via ci.yml — never from a feature branch.

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    # main (and v* tags) are handled by ci.yml's full gate; everything else
    # gets these fast checks. branches-ignore doesn't match tags.
    branches-ignore:
      - main

# Collapse the push + pull_request events that both fire once a branch has an
# open PR into a single run: normalize the group to the source branch name
# (`head.ref` on PR events, `ref_name` on push events) so the duplicate is
# cancelled instead of running twice.
concurrency:
  group: pr-${{ github.event.pull_request.head.ref || github.ref_name }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  SQLX_OFFLINE: "true"

jobs:
  # ── Fail fast: fmt, clippy, and a locked build ───────────────────
  quick-checks:
    name: Quick checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: rui314/setup-mold@v1
      - uses: Swatinem/rust-cache@v2
      - name: cargo fmt --check
        run: cargo fmt --all --check
      - name: cargo clippy (-D warnings)
        run: cargo clippy --workspace --all-targets --all-features --locked -- -D warnings
      # --locked fails if Cargo.lock is stale/uncommitted — the Rust analog of
      # the `go mod tidy` diff check.
      - name: cargo build (locked)
        run: cargo build --workspace --all-features --locked

  # ── Backtest gate: precision/recall must not regress (§18) ───────
  backtest:
    name: Backtest P/R gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: rui314/setup-mold@v1
      - uses: Swatinem/rust-cache@v2
      - name: Replay fixtures, compare to committed baseline
        run: cargo run -p backtest --all-features --locked
        # Fails the PR if any detector's measured precision/recall drops
        # below crates/backtest/baseline.json. An intentional change to a
        # detector's numbers updates the baseline in the same PR via
        # `just backtest-update-baseline` (reviewed like any other diff).

  # ── Coverage → Codecov ───────────────────────────────────────────
  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: rui314/setup-mold@v1
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov
      - name: Generate coverage (lcov)
        run: cargo llvm-cov --workspace --all-features --locked --lcov --output-path lcov.info
      - name: Upload to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}   # repo secret; optional for public repos
          files: lcov.info
          fail_ci_if_error: false                # don't block the PR on Codecov hiccups
